<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Quotation</title>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">Quotation</h1>
        </header>
        
        <div class="quotation-details">
            <h2>Your Quotation</h2>
            <p>Thank you for your request! Here’s the quotation for your imaginary object:</p>
            <ul>
                <li>Design Cost: $100</li>
                <li>Material Cost: $50</li>
                <li>Estimated Time: 5 days</li>
            </ul>
            <p><strong>Total: $150</strong></p>
        </div>

        <form action="order_confirmation.html" method="post">
            <button type="submit" class="btn">Confirm Order</button>
        </form>
    </div>
</body>
</html>
