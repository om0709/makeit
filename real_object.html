<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Upload Real Object</title>
</head>
<body>
    <header>
        <h1>Upload Real Object</h1>
    </header>
    <div class="container">
        <form>
            <label for="photo">Upload a photo:</label>
            <input type="file" id="photo" accept="image/*" required>
            <label for="dimensions">Mark dimensions:</label>
            <input type="text" id="dimensions" placeholder="Enter dimensions" required>
            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
    <footer>
        <p>&copy; 2024 Makeito. All rights reserved.</p>
    </footer>
</body>
</html>
