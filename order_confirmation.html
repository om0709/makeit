<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Order Confirmation</title>
</head>
<body>
    <header>
        <h1>Order Confirmation</h1>
    </header>
    <div class="container">
        <div class="order-details">
            <p><strong>Shop Selected:</strong> <span id="shopName">XYZ Welding Shop</span></p>
            <p><strong>Completion Date:</strong> <span id="completionDate">November 10, 2024</span></p>
            <p><strong>Initial Payment:</strong> <span id="initialPayment">$100</span></p>
            <div class="progress-bar">
                <div class="progress" style="width: 10%;"></div>
            </div>
            <p>Current Progress: 10%</p>
        </div>
        <button class="btn" onclick="location.href='progress_tracking.html';">Track Progress</button>
    </div>
    <footer>
        <p>&copy; 2024 Makeito. All rights reserved.</p>
    </footer>
</body>
</html>
