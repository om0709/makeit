<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Imaginary Object Creation</title>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">Create Imaginary Object</h1>
        </header>
        <form action="quotation.html" method="post">
            <label for="object-description">Describe Your Imaginary Object:</label>
            <textarea id="object-description" name="object-description" rows="4" required></textarea>

            <button type="submit" class="btn">Generate Design</button>
        </form>

        <!-- Placeholder for generated design -->
        <div class="generated-design">
            <h2>Your Generated Design:</h2>
            <img src="placeholder-design.png" alt="Generated Design" class="design-placeholder"> <!-- Placeholder image -->
        </div>
    </div>
</body>
</html>
